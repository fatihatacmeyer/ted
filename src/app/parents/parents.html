<div class="home-container">
  <div class="title-section">
    <h3>Veliler</h3>
  </div>

  @if (isLoading) {
    <div class="loading-box">
      <p>Bekle...</p>
    </div>
  }

  @if (errorMessage) {
    <div class="error-box">
      <p>{{ errorMessage }}</p>
    </div>
  }

  @if (!isLoading && !errorMessage) {
    <app-person-table [persons]="persons"></app-person-table>
  }
</div>
