<div class="admin-wrapper">
  <div class="admin-card">
    <div class="d-flex justify-content-between align-items-center mb-3 gap-2 flex-wrap">
      <h4 class="fw-bold mb-0" style="color: #dc2134;">Veliler</h4>

      <button
        pButton
        class="p-button-sm"
        icon="pi pi-plus"
        label="Veli Ekle"
        (click)="openAddDialog()"
      ></button>
    </div>

    <div class="small text-muted mb-3">
      Veli listesini buradan görüntüleyebilir ve yeni kayıt ekleyebilirsiniz.
    </div>

    @if (isLoading) {
      <div class="loading-box">
        <p-progressSpinner strokeWidth="4" fill="transparent" animationDuration=".8s"></p-progressSpinner>
        <span class="loading-text">Yükleniyor...</span>
      </div>
    }

    @if (errorMessage) {
      <div class="error-box">
        <p>{{ errorMessage }}</p>
      </div>
    }

    @if (!isLoading && !errorMessage) {
      <app-person-table [persons]="persons" [loading]="isLoading"></app-person-table>
    }
  </div>
</div>

<app-person-form
  [(visible)]="showAddDialog"
  [userdef]="USERDEF"
  title="Yeni Veli Ekle"
  (saved)="onPersonSaved()"
></app-person-form>
